auth:
  bearer_tokens: []
  jwt:
    secret:
    opts:
      max_age: 360d
    claims:
      - email
      - nameSurname
  cors:
    allowed_origins: []

database:
  redis:
    url:

event_types:
  - type: error
    label: Error
    params:
      - message:
          type: string
          label: Message
    trace: true
  - type: info
    label: Info
    params:
      - message:
          type: string
          label: Message
    trace: true
  - type: warn
    label: Warning
    params:
      - message:
          type: string
          label: Message
    trace: true
  - type: debug
    label: Debug
    params:
      - message:
          type: string
          label: Message
    trace: true
